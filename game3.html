<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ERGOPACK — Spin & Win</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #1b3a5c;
    --navy2:   #14304f;
    --navy3:   #0d2037;
    --blue:    #2a5f8f;
    --gold:    #c8973a;
    --gold2:   #e8b44b;
    --cream:   #f5f0e8;
    --white:   #ffffff;
    --light:   #dce8f5;
  }

  body {
    min-height: 100vh;
    background: var(--navy3);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── background dots pattern ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── header ─── */
  header {
    width: 100%; max-width: 900px;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 24px 32px 10px;
    position: relative; z-index: 2;
  }
  .logo-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 18px; color: var(--navy);
    letter-spacing: -1px; flex-shrink: 0;
    border: 2px solid var(--gold);
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700; font-size: 28px;
    color: var(--white); letter-spacing: 3px;
  }
  .tagline {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold2); margin-top: 2px; text-align: center;
  }

  /* ─── main layout ─── */
  main {
    width: 100%; max-width: 900px;
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 20px 40px;
    position: relative; z-index: 2;
    gap: 0;
  }

  .title-row {
    text-align: center; margin-bottom: 18px;
  }
  .title-row h1 {
    font-family: 'Playfair Display', serif;
    font-size: 38px; font-weight: 900;
    color: var(--white);
    text-shadow: 0 2px 20px rgba(200,151,58,.3);
    line-height: 1.1;
  }
  .title-row h1 span { color: var(--gold2); }
  .title-row p {
    color: var(--light); font-size: 14px; margin-top: 6px;
    letter-spacing: .5px; opacity: .8;
  }

  /* ─── spinner area ─── */
  .spinner-wrap {
    position: relative;
    width: 380px; height: 380px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* outer ring glow */
  .spinner-wrap::before {
    content: '';
    position: absolute; inset: -10px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      var(--gold) 0%, var(--gold2) 25%,
      var(--gold) 50%, var(--gold2) 75%, var(--gold) 100%
    );
    animation: ring-spin 8s linear infinite;
    z-index: 0;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }

  .spinner-wrap::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%; background: var(--navy3);
    z-index: 1;
  }

  canvas#wheel {
    border-radius: 50%;
    position: relative; z-index: 2;
    display: block;
    filter: drop-shadow(0 8px 30px rgba(0,0,0,.5));
  }

  /* pointer */
  .pointer {
    position: absolute; top: -10px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 38px solid var(--gold2);
    filter: drop-shadow(0 3px 6px rgba(0,0,0,.4));
  }
  .pointer::after {
    content: '';
    position: absolute; top: -42px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--gold2);
    border: 3px solid var(--white);
  }

  /* center hub */
  .hub {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    width: 62px; height: 62px; border-radius: 50%;
    background: var(--white);
    border: 4px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 12px; color: var(--navy);
    letter-spacing: .5px;
    cursor: pointer;
    box-shadow: 0 0 0 6px var(--navy3), 0 0 0 8px var(--gold);
  }

  /* ─── spin button ─── */
  .spin-btn {
    margin-top: 22px;
    padding: 16px 56px;
    border-radius: 60px;
    background: var(--gold);
    color: var(--navy3);
    font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: 2px; text-transform: uppercase;
    border: none; cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 6px 24px rgba(200,151,58,.45), 0 0 0 3px rgba(232,180,75,.2);
  }
  .spin-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background .2s;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(200,151,58,.55); }
  .spin-btn:active:not(:disabled) { transform: scale(.97); }
  .spin-btn:disabled { opacity: .55; cursor: not-allowed; }

  .spin-icon { font-size: 20px; margin-right: 8px; display: inline-block; }

  /* ─── result card ─── */
  .result-card {
    margin-top: 20px;
    width: 100%; max-width: 480px;
    background: var(--white);
    border-radius: 20px;
    padding: 26px 30px;
    text-align: center;
    opacity: 0; transform: translateY(20px) scale(.96);
    transition: opacity .5s, transform .5s;
    position: relative; overflow: hidden;
    border: 2px solid var(--gold);
  }
  .result-card.show { opacity: 1; transform: translateY(0) scale(1); }

  .result-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, var(--navy), var(--gold2), var(--navy));
    background-size: 200% 100%;
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer { 0%,100%{background-position:0%} 50%{background-position:100%} }

  .result-card .label {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--blue); font-weight: 700; margin-bottom: 8px;
  }
  .result-card .category-name {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 900;
    color: var(--navy); margin-bottom: 10px;
  }
  .result-card .question {
    font-size: 16px; color: #444; line-height: 1.55;
    padding: 12px 16px;
    background: var(--cream);
    border-radius: 12px;
    border-left: 4px solid var(--gold);
  }
  .result-card .again-link {
    display: inline-block; margin-top: 16px;
    font-size: 13px; font-weight: 700;
    color: var(--blue); cursor: pointer;
    letter-spacing: .5px; text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ─── confetti canvas ─── */
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

  /* ─── footer ─── */
  footer {
    position: relative; z-index: 2;
    font-size: 12px; color: rgba(255,255,255,.3);
    padding: 10px; letter-spacing: 1px;
  }

  /* mobile */
  @media (max-width: 500px) {
    .spinner-wrap { width: 300px; height: 300px; }
    .title-row h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-circle">EP</div>
  <div>
    <div class="brand-name">ERGOPACK</div>
    <div class="tagline">Spin &amp; Win</div>
  </div>
</header>

<main>
  <div class="title-row">
    <h1>Give the wheel a <span>spin!</span></h1>
    <p>Answer the question to unlock a special reward 🎁</p>
  </div>

  <div class="spinner-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="360" height="360"></canvas>
    <div class="hub" id="hubBtn">SPIN</div>
  </div>

  <button class="spin-btn" id="spinBtn">
    <span class="spin-icon">🎰</span> SPIN THE WHEEL
  </button>

  <div class="result-card" id="resultCard">
    <div class="label">Your Category Is</div>
    <div class="category-name" id="resultName">—</div>
    <div class="question" id="resultQuestion">—</div>
    <span class="again-link" id="againBtn">↺ Spin again</span>
  </div>
</main>

<canvas id="confetti"></canvas>
<footer>© 2025 ERGOPACK — All Rights Reserved</footer>

<script>
const SEGMENTS = [
  { label: "Back\nHealth",     color: "#1b3a5c", text: "#e8b44b" },
  { label: "Carry\nSmart",     color: "#c8973a", text: "#ffffff" },
  { label: "Strap\nFit",       color: "#14304f", text: "#e8b44b" },
  { label: "Weight\nBalance",  color: "#2a5f8f", text: "#ffffff" },
  { label: "Ergo\nFacts",      color: "#c8973a", text: "#14304f" },
  { label: "Posture\nCheck",   color: "#0d2037", text: "#e8b44b" },
  { label: "Pack\nRight",      color: "#1b3a5c", text: "#e8b44b" },
  { label: "Daily\nComfort",   color: "#e8b44b", text: "#0d2037" },
];

// const QUESTIONS = {
//   "Back\nHealth":    "Do you ever feel back or shoulder pain after carrying your bag? An ergonomic backpack distributes weight evenly — would that change how you pack daily?",
//   "Carry\nSmart":    "Did you know carrying more than 10% of your body weight in a bag can strain your spine? How much do you usually carry — and could you lighten the load?",
//   "Strap\nFit":      "Are your bag straps adjusted so the bag sits snug against your back — or does it hang low? Proper strap fit can reduce shoulder tension by up to 50%!",
//   "Weight\nBalance": "Do you pack heavier items at the top or bottom of your bag? Hint: heaviest items should always sit closest to your back for best spinal support!",
//   "Ergo\nFacts":     "True or false: a padded back panel on a backpack is just for comfort. FALSE — it also improves airflow and keeps your spine aligned. Did you know that?",
//   "Posture\nCheck":  "Stand up straight — does your bag pull your shoulders back or forward? An ergonomic bag should keep your shoulders neutral and your chin up!",
//   "Pack\nRight":     "What's the heaviest thing you carry daily — laptop, books, water bottle? There's an ergonomic packing order that protects your back. Want to know it?",
//   "Daily\nComfort":  "On a scale of 1–10, how comfortable is your current bag after 2+ hours of wearing it? Ergonomic bags are designed to stay comfortable all day — what would a 10 feel like to you?",
// };

const canvas  = document.getElementById('wheel');
const ctx     = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const hubBtn  = document.getElementById('hubBtn');
const card    = document.getElementById('resultCard');
const resName = document.getElementById('resultName');
const resQ    = document.getElementById('resultQuestion');
const againBtn= document.getElementById('againBtn');

const N       = SEGMENTS.length;
const ARC     = (2 * Math.PI) / N;
const CX      = canvas.width  / 2;
const CY      = canvas.height / 2;
const R       = CX - 8;

let angle     = 0;
let spinning  = false;

/* ── draw wheel ── */
function draw(rot) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* outer ring */
  ctx.beginPath();
  ctx.arc(CX, CY, R + 6, 0, 2*Math.PI);
  ctx.fillStyle = '#c8973a';
  ctx.fill();

  for (let i = 0; i < N; i++) {
    const start = rot + i * ARC;
    const end   = start + ARC;
    const seg   = SEGMENTS[i];

    /* slice */
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    /* text */
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + ARC / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = seg.text;
    ctx.font = `bold 13px 'Nunito', sans-serif`;
    const lines = seg.label.split('\n');
    const lh = 16;
    const ty = -(lines.length - 1) * lh / 2;
    lines.forEach((line, li) => {
      ctx.fillText(line, R - 18, ty + li * lh + 4);
    });
    ctx.restore();

    /* divider tick */
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start);
    ctx.beginPath();
    ctx.moveTo(R - 2, 0);
    ctx.lineTo(R + 5, 0);
    ctx.strokeStyle = '#e8b44b';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  /* inner shadow ring */
  const grad = ctx.createRadialGradient(CX, CY, R*0.4, CX, CY, R*0.7);
  grad.addColorStop(0, 'rgba(0,0,0,.18)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.fillStyle = grad;
  ctx.fill();
}

draw(angle);

/* ── spin logic ── */
function getWinner(finalAngle) {
  /* pointer is at top = -PI/2; normalise angle to find which segment sits under pointer */
  const norm = ((-(finalAngle) + (Math.PI / 2)) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(norm / ARC) % N;
}

function spin() {
  if (spinning) return;
  spinning = true;
  spinBtn.disabled = true;
  card.classList.remove('show');

  const extra    = Math.PI * 2 * (8 + Math.floor(Math.random() * 6)); // 8-14 full turns
  const target   = angle + extra + Math.random() * Math.PI * 2;
  const duration = 4000 + Math.random() * 1500;
  const start    = performance.now();
  const from     = angle;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function step(now) {
    const elapsed = now - start;
    const t       = Math.min(elapsed / duration, 1);
    const eased   = easeOut(t);
    angle         = from + (target - from) * eased;
    draw(angle);

    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      angle   = target % (Math.PI * 2);
      spinning = false;
      spinBtn.disabled = false;
      showResult();
    }
  }
  requestAnimationFrame(step);
}

function showResult() {
  const idx  = getWinner(angle);
  const seg  = SEGMENTS[idx];
  const name = seg.label.replace('\n', ' ');
  resName.textContent = name;
  resQ.textContent    = QUESTIONS[seg.label] || "Great category — tell us something about it!";
  card.classList.add('show');
  launchConfetti();
}

spinBtn.addEventListener('click', spin);
hubBtn.addEventListener('click', spin);
againBtn.addEventListener('click', () => {
  card.classList.remove('show');
  setTimeout(spin, 300);
});

/* ── confetti ── */
const ccv = document.getElementById('confetti');
const cctx = ccv.getContext('2d');
let pieces = [];

function launchConfetti() {
  ccv.width  = window.innerWidth;
  ccv.height = window.innerHeight;
  pieces = [];
  const colors = ['#c8973a','#e8b44b','#1b3a5c','#ffffff','#2a5f8f','#dce8f5'];
  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * ccv.width,
      y: -10 - Math.random() * 200,
      w: 6 + Math.random() * 8,
      h: 10 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - .5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      vr: (Math.random() - .5) * 8,
      life: 1,
    });
  }
  animateConfetti();
}

function animateConfetti() {
  cctx.clearRect(0, 0, ccv.width, ccv.height);
  let alive = false;
  for (const p of pieces) {
    p.x   += p.vx;
    p.y   += p.vy;
    p.vy  += 0.1;
    p.rot += p.vr;
    p.life = Math.max(0, 1 - (p.y / (ccv.height * 1.2)));
    cctx.save();
    cctx.globalAlpha = p.life;
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rot * Math.PI / 180);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    cctx.restore();
    if (p.y < ccv.height + 20) alive = true;
  }
  if (alive) requestAnimationFrame(animateConfetti);
  else cctx.clearRect(0, 0, ccv.width, ccv.height);
}

window.addEventListener('resize', () => {
  ccv.width  = window.innerWidth;
  ccv.height = window.innerHeight;
});
</script>
</body>
</html>
